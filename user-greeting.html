<!DOCTYPE html>
<html>

<head>
    <title>User Greeting</title>
</head>

<body>
    <script>
        // promote user for thir name 
        let username = prompt("Please enter your name:");
        // Display greeting on the page 
        document.write("<h1>Hello, " + username + "!</h1>");
        // show alert message
        alert("Hello, " + username + "!");
    </script>
</body>

</html>
